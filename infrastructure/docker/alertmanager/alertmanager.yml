global:
  resolve_timeout: 5m

# Default route
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'nodeprism-webhook'
  routes:
    # Critical alerts - repeat every 1h, shorter group interval
    - match:
        severity: critical
      receiver: 'nodeprism-webhook'
      group_interval: 2m
      repeat_interval: 1h
      continue: false

    # Warning alerts - repeat every 4h, relaxed timing
    - match:
        severity: warning
      receiver: 'nodeprism-webhook'
      group_interval: 5m
      repeat_interval: 4h
      continue: false

# Receivers (notification channels)
receivers:
  - name: 'nodeprism-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:4000/api/alerts/webhook'
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: 'default'
    # Fallback receiver
    webhook_configs:
      - url: 'http://host.docker.internal:4000/api/alerts/webhook'
        send_resolved: true

  - name: 'critical'
    # Critical alerts - webhook + future email/pagerduty
    webhook_configs:
      - url: 'http://host.docker.internal:4000/api/alerts/webhook'
        send_resolved: true

  - name: 'warning'
    # Warning alerts
    webhook_configs:
      - url: 'http://host.docker.internal:4000/api/alerts/webhook'
        send_resolved: true

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
