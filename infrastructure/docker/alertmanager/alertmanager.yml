global:
  resolve_timeout: 5m

# Default route
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'nodeprism-webhook'
  routes:
    # Critical alerts - also notify via webhook
    - match:
        severity: critical
      receiver: 'nodeprism-webhook'
      continue: false

    # Warning alerts - notify via webhook
    - match:
        severity: warning
      receiver: 'nodeprism-webhook'
      continue: false

# Receivers (notification channels)
receivers:
  - name: 'nodeprism-webhook'
    webhook_configs:
      - url: 'http://172.20.0.1:4000/api/alerts/webhook'
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: 'default'
    # Fallback receiver
    webhook_configs:
      - url: 'http://172.20.0.1:4000/api/alerts/webhook'
        send_resolved: true

  - name: 'critical'
    # Critical alerts - webhook + future email/pagerduty
    webhook_configs:
      - url: 'http://172.20.0.1:4000/api/alerts/webhook'
        send_resolved: true

  - name: 'warning'
    # Warning alerts
    webhook_configs:
      - url: 'http://172.20.0.1:4000/api/alerts/webhook'
        send_resolved: true

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
