version: '3.8'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # PostgreSQL - Configuration Database
  postgres:
    image: postgres:15-alpine
    container_name: nodeprism-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${DB_NAME:-nodeprism}
      POSTGRES_USER: ${DB_USER:-nodeprism}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nodeprism123}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nodeprism-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nodeprism']
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL - Sample Database for Monitoring
  mysql:
    image: mysql:8.0
    container_name: nodeprism-mysql
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nodeprism}
      MYSQL_USER: ${MYSQL_USER:-nodeprism}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nodeprism123}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - nodeprism-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - Sample Database for Monitoring
  mongodb:
    image: mongo:7.0
    container_name: nodeprism-mongodb
    restart: unless-stopped
    logging: *default-logging
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-admin}
    ports:
      - '${MONGODB_PORT:-27017}:27017'
    volumes:
      - mongodb-data:/data/db
    networks:
      - nodeprism-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache & Session Storage
  redis:
    image: redis:7-alpine
    container_name: nodeprism-redis
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    networks:
      - nodeprism-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # RabbitMQ - Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: nodeprism-rabbitmq
    restart: unless-stopped
    logging: *default-logging
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-nodeprism}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-nodeprism123}
    ports:
      - '${RABBITMQ_PORT:-5672}:5672' # AMQP
      - '15672:15672' # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - nodeprism-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  # Prometheus - Metrics Storage
  prometheus:
    image: prom/prometheus:latest
    container_name: nodeprism-prometheus
    restart: unless-stopped
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=2GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.external-url=/prometheus/'
      - '--web.route-prefix=/'
    ports:
      - '127.0.0.1:9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - ./prometheus/targets:/etc/prometheus/targets
      - prometheus-data:/prometheus
    networks:
      - nodeprism-network
    depends_on:
      - alertmanager

  # Nginx - Sample Web Server for Monitoring
  nginx:
    image: nginx:alpine
    container_name: nodeprism-nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '8080:80'
    volumes:
      - ./sample-nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-data:/var/log/nginx
    networks:
      - nodeprism-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:80']
      interval: 10s
      timeout: 5s
      retries: 5

  # Apache - Sample Web Server for Monitoring
  apache:
    image: httpd:alpine
    container_name: nodeprism-apache
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '8081:80'
    volumes:
      - ./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - apache-data:/usr/local/apache2/logs
    networks:
      - nodeprism-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:80 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: nodeprism-grafana
    restart: unless-stopped
    logging: *default-logging
    user: '0'  # Run as root to fix permission issues
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://${SERVER_IP:-localhost}:${WEB_PORT:-3000}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_LIVE_MAX_CONNECTIONS=0
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - DB_PASSWORD=${DB_PASSWORD:-nodeprism123}
    ports:
      - '127.0.0.1:${GRAFANA_PORT:-3030}:3000'
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - nodeprism-network
    depends_on:
      - prometheus
      - loki
      - postgres

  # Node Exporter for Manager/Host machine
  node-exporter:
    image: prom/node-exporter:latest
    container_name: nodeprism-node-exporter
    restart: unless-stopped
    logging: *default-logging
    network_mode: host
    pid: host
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run|snap|var/lib/docker)($$|/)'
      - '--web.listen-address=:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: nodeprism-loki
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    networks:
      - nodeprism-network

  # Promtail - Log Shipper (for manager node)
  promtail:
    image: grafana/promtail:latest
    container_name: nodeprism-promtail
    restart: unless-stopped
    logging: *default-logging
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/log:/var/log:ro
    networks:
      - nodeprism-network
    depends_on:
      - loki

  # AlertManager - Alert Routing
  alertmanager:
    image: prom/alertmanager:latest
    container_name: nodeprism-alertmanager
    restart: unless-stopped
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - '127.0.0.1:9093:9093'
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    networks:
      - nodeprism-network

  # Pushgateway - For Batch Jobs
  pushgateway:
    image: prom/pushgateway:latest
    container_name: nodeprism-pushgateway
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '9091:9091'
    networks:
      - nodeprism-network

  # Database Exporters
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: nodeprism-mysql-exporter
    restart: unless-stopped
    logging: *default-logging
    environment:
      - MYSQLD_EXPORTER_PASSWORD=${MYSQL_ROOT_PASSWORD:-password}
    ports:
      - '9104:9104'
    networks:
      - nodeprism-network
    depends_on:
      - mysql
    command:
      - --mysqld.address=mysql:3306
      - --mysqld.username=root
      - --collect.info_schema.innodb_metrics
      - --collect.info_schema.processlist
      - --collect.info_schema.query_response_time
      - --collect.info_schema.userstats
      - --collect.engine_innodb_status

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: nodeprism-postgres-exporter
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATA_SOURCE_NAME=postgresql://${DB_USER:-nodeprism}:${DB_PASSWORD:-nodeprism123}@postgres:5432/${DB_NAME:-nodeprism}?sslmode=disable
    ports:
      - '9187:9187'
    networks:
      - nodeprism-network
    depends_on:
      - postgres
    command:
      - --extend.query-path=/etc/postgres_exporter/queries.yaml

  mongodb-exporter:
    image: bitnami/mongodb-exporter:latest
    container_name: nodeprism-mongodb-exporter
    restart: unless-stopped
    logging: *default-logging
    environment:
      - MONGODB_URI=mongodb://${MONGODB_ROOT_USERNAME:-root}:${MONGODB_ROOT_PASSWORD:-password}@mongodb:27017/${MONGODB_DATABASE:-admin}
    ports:
      - '9216:9216'
    networks:
      - nodeprism-network
    depends_on:
      - mongodb

  # Web Server Exporters
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nodeprism-nginx-exporter
    restart: unless-stopped
    logging: *default-logging
    environment:
      - NGINX_STATUS_URL=http://nginx:8080/status
    ports:
      - '9113:9113'
    networks:
      - nodeprism-network
    depends_on:
      - nginx

  apache-exporter:
    image: lusotycoon/apache-exporter:latest
    container_name: nodeprism-apache-exporter
    restart: unless-stopped
    logging: *default-logging
    environment:
      - APACHE_STATUS_URL=http://apache:80/server-status?auto
    ports:
      - '9117:9117'
    networks:
      - nodeprism-network
    depends_on:
      - apache

  # Reverse Proxy - Production nginx proxy for Web UI and API
  reverse-proxy:
    image: nginx:alpine
    container_name: nodeprism-reverse-proxy
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '${PROXY_PORT:-8443}:80'
      # - '443:443'  # Uncomment when SSL certs are available
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      # - ./certs:/etc/nginx/certs:ro  # Uncomment for SSL
      # - ./certbot:/var/www/certbot:ro  # Uncomment for Let's Encrypt
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - nodeprism-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1:80/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # Docusaurus - Documentation Site
  docs:
    build:
      context: ../../docs-site
      dockerfile: Dockerfile
    container_name: nodeprism-docs
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '${DOCS_PORT:-3080}:3080'
    networks:
      - nodeprism-network

networks:
  nodeprism-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
  loki-data:
  alertmanager-data:
  mysql-data:
  mongodb-data:
  nginx-data:
  apache-data:
