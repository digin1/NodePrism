groups:
  - name: instance_alerts
    interval: 30s
    rules:
      # Instance down alert
      - alert: InstanceDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 5 minutes."

      # High CPU usage - preserve server_id in aggregation
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance, server_id) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% (current value: {{ $value }}%)"

      # High Load Average - server_id already present in node_load1
      - alert: HighLoadAverage
        expr: node_load1 > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High load average on {{ $labels.instance }}"
          description: "1-minute load average is above 10 (current value: {{ $value }})"

      # Critical Load Average
      - alert: CriticalLoadAverage
        expr: node_load1 > 50
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical load average on {{ $labels.instance }}"
          description: "1-minute load average is critically high at {{ $value }}"

      # High memory usage - server_id already present
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 80% (current value: {{ $value }}%)"

      # Low disk space - exclude tmpfs, cagefs bind mounts, and /boot
      - alert: LowDiskSpace
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs",mountpoint!~".*/cagefs-skeleton/.*|/boot.*"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs",mountpoint!~".*/cagefs-skeleton/.*|/boot.*"})) * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk {{ $labels.mountpoint }} usage is above 80% (current value: {{ $value }}%)"

      # Critical disk space
      - alert: CriticalDiskSpace
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs",mountpoint!~".*/cagefs-skeleton/.*|/boot.*"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs",mountpoint!~".*/cagefs-skeleton/.*|/boot.*"})) * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}"
          description: "Disk {{ $labels.mountpoint }} usage is above 95% (current value: {{ $value }}%)"

  - name: storage_alerts
    interval: 30s
    rules:
      # LVM Volume Group low space (KVM hosts)
      - alert: LVMVolumeGroupLowSpace
        expr: (1 - (nodeprism_lvm_vg_free_bytes / nodeprism_lvm_vg_size_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LVM VG {{ $labels.vg }} low on space on {{ $labels.instance }}"
          description: "Volume group {{ $labels.vg }} is {{ $value | printf \"%.1f\" }}% full"

      # LVM Volume Group critical space (KVM hosts)
      - alert: LVMVolumeGroupCriticalSpace
        expr: (1 - (nodeprism_lvm_vg_free_bytes / nodeprism_lvm_vg_size_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "LVM VG {{ $labels.vg }} critically full on {{ $labels.instance }}"
          description: "Volume group {{ $labels.vg }} is {{ $value | printf \"%.1f\" }}% full — VM provisioning may fail"

  - name: monitoring_alerts
    interval: 30s
    rules:
      # Too many scrape errors
      - alert: TooManyScrapeErrors
        expr: increase(prometheus_target_scrapes_exceeded_sample_limit_total[1m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Too many scrape errors"
          description: "Prometheus is experiencing high scrape error rate"

      # Prometheus target missing
      - alert: PrometheusTargetMissing
        expr: up{job!~"prometheus|pushgateway"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target missing"
          description: "Target {{ $labels.instance }} is down"

  - name: anomaly_alerts
    interval: 30s
    rules:
      # High Node Anomaly Rate — many metrics anomalous on one server
      - alert: HighAnomalyRate
        expr: nodeprism_anomaly_rate > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High anomaly rate on server {{ $labels.server_id }}"
          description: "Node Anomaly Rate is {{ $value | printf \"%.1f\" }}% — more than 30% of monitored metrics are anomalous"

      # Critical Node Anomaly Rate
      - alert: CriticalAnomalyRate
        expr: nodeprism_anomaly_rate > 60
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical anomaly rate on server {{ $labels.server_id }}"
          description: "Node Anomaly Rate is {{ $value | printf \"%.1f\" }}% — more than 60% of monitored metrics are anomalous"

      # Individual metric anomaly sustained for 5+ minutes
      - alert: SustainedAnomaly
        expr: nodeprism_anomaly_detected == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sustained anomaly: {{ $labels.metric_name }} on {{ $labels.server_id }}"
          description: "Metric {{ $labels.metric_name }} has been anomalous for over 5 minutes"
