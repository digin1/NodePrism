global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'nodeprism-vitals'
    environment: 'production'

# AlertManager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - '/etc/prometheus/alerts.yml'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Grafana (metrics served under /grafana/ sub-path)
  - job_name: 'grafana'
    metrics_path: '/grafana/metrics'
    static_configs:
      - targets: ['grafana:3000']

  # AlertManager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # Pushgateway
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  # NodePrism API self-monitoring
  - job_name: 'nodeprism-api'
    static_configs:
      - targets: ['host.docker.internal:4000']
    metrics_path: '/metrics'

  # Node Exporter - File-based service discovery
  - job_name: 'node-exporter'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/node-exporter/*.json'
    relabel_configs:
      - source_labels: [server_id]
        target_label: server_id
      - source_labels: [hostname]
        target_label: hostname
      - source_labels: [environment]
        target_label: environment
      - source_labels: [region]
        target_label: region

  # Application Agent - File-based service discovery
  - job_name: 'app-agent'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/app-agent/*.json'
    relabel_configs:
      - source_labels: [server_id]
        target_label: server_id
      - source_labels: [hostname]
        target_label: hostname

  # Database Exporters - File-based service discovery
  # 30s interval: each scrape runs SQL queries against the database
  - job_name: 'mysql-exporter'
    scrape_interval: 30s
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/mysql-exporter/*.json'

  - job_name: 'postgres-exporter'
    scrape_interval: 30s
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/postgres-exporter/*.json'

  - job_name: 'mongodb-exporter'
    scrape_interval: 30s
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/mongodb-exporter/*.json'

  # Web Server Exporters - File-based service discovery
  - job_name: 'nginx-exporter'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/nginx-exporter/*.json'

  - job_name: 'apache-exporter'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/apache-exporter/*.json'

  - job_name: 'redis-exporter'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/redis-exporter/*.json'

  # Libvirt Exporter - KVM/QEMU per-VM metrics
  # Generous timeout for hosts with many VMs (200+ domains)
  - job_name: 'libvirt-exporter'
    scrape_interval: 30s
    scrape_timeout: 25s
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/libvirt-exporter/*.json'
    relabel_configs:
      - source_labels: [server_id]
        target_label: server_id
      - source_labels: [hostname]
        target_label: hostname

  # LiteSpeed Exporter - Web server metrics from .rtreport
  - job_name: 'litespeed-exporter'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/litespeed-exporter/*.json'
    relabel_configs:
      - source_labels: [server_id]
        target_label: server_id
      - source_labels: [hostname]
        target_label: hostname

  # Exim Exporter - Mail queue, deliveries, per-domain stats
  # 30s interval: parses mail queue and log files each scrape
  - job_name: 'exim-exporter'
    scrape_interval: 30s
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/exim-exporter/*.json'
    relabel_configs:
      - source_labels: [server_id]
        target_label: server_id
      - source_labels: [hostname]
        target_label: hostname

  # cPanel Exporter - Account, domain, bandwidth metrics
  - job_name: 'cpanel-exporter'
    scrape_interval: 60s
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/cpanel-exporter/*.json'
    relabel_configs:
      - source_labels: [server_id]
        target_label: server_id
      - source_labels: [hostname]
        target_label: hostname
