<svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="prism-top" x1="6" y1="6" x2="26" y2="18">
    <stop offset="0%" stop-color="#4ade80"/>
    <stop offset="100%" stop-color="#22c55e"/>
  </linearGradient>
  <linearGradient id="prism-left" x1="2" y1="12" x2="16" y2="34">
    <stop offset="0%" stop-color="#22c55e"/>
    <stop offset="100%" stop-color="#15803d"/>
  </linearGradient>
  <linearGradient id="prism-right" x1="30" y1="12" x2="16" y2="34">
    <stop offset="0%" stop-color="#16a34a"/>
    <stop offset="100%" stop-color="#0f5132"/>
  </linearGradient>
</defs>

<!-- Prism icon -->
<polygon points="16,3 29,12 16,17 3,12" fill="url(#prism-top)"/>
<polygon points="3,12 16,17 16,35 3,27" fill="url(#prism-left)"/>
<polygon points="29,12 16,17 16,35 29,27" fill="url(#prism-right)"/>
<!-- Refraction rays -->
<line x1="25" y1="16" x2="32" y2="13" stroke="#a7f3d0" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
<line x1="25" y1="19" x2="33" y2="18" stroke="#86efac" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
<line x1="25" y1="22" x2="32" y2="23" stroke="#6ee7b7" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

<!-- "NodePrism" text -->
<text x="40" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="600" fill="#e5e7eb">
  <tspan fill="#f9fafb">Node</tspan><tspan fill="#22c55e">Prism</tspan>
</text>
</svg>
