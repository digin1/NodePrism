# ============================================
# NodePrism - Simulation Environment
# ============================================
# Creates simulated monitored servers for testing
# Each server runs node_exporter to provide metrics
#
# Port Mapping (9200-9208 reserved for simulation):
#   - web-server-01:     9200
#   - web-server-02:     9201
#   - db-server-01:      9202
#   - db-server-02:      9203
#   - cache-server-01:   9204
#   - api-server-01:     9205
#   - worker-server-01:  9206
#   - staging-server-01: 9207
#   - dev-server-01:     9208
# ============================================

services:
  # ==================== Production Web Servers ====================
  web-server-01:
    image: prom/node-exporter:latest
    container_name: sim-web-server-01
    hostname: web-server-01
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--web.listen-address=:9100'
    ports:
      - "9200:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - nodeprism-network
    labels:
      - "nodeprism.simulation=true"
      - "nodeprism.server.type=web"
      - "nodeprism.environment=production"
      - "nodeprism.region=us-east-1"

  web-server-02:
